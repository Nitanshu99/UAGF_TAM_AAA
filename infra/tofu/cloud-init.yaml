#cloud-config
# AAA — first-boot bootstrap for each application host (§14.8).
# Installs Docker + Compose; pulls the AAA repo; brings the stack up.

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - jq
  - restic

write_files:
  - path: /etc/aaa/environment
    permissions: "0600"
    content: |
      AAA_ENV=${environment}

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
      > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - mkdir -p /opt/aaa
  - git clone https://github.com/Nitanshu99/UAGF_TAM_AAA.git /opt/aaa || true
  - cd /opt/aaa && docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
  # Operator runs `docker compose ... up -d` manually after seeding OpenBao.
