# AAA — Local Development Docker Compose (§14.4)
# Services: Postgres, Qdrant, MinIO, Valkey, Langfuse, OpenBao
#
# Usage:
#   cp .env.example .env   # fill in real values
#   make up                # starts services + runs alembic migrations
#   make down              # stops and removes containers

services:

  # --------------------------------------------------------------------------
  # Postgres — LangGraph checkpointer + engagement DB
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-aaa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aaa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Qdrant — Vector store for RegulatoryRAG
  # --------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object store for EvidenceStore artefacts
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aaa-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Valkey (Redis fork) — optional result caching
  # --------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:7.2-alpine
    restart: unless-stopped
    command: valkey-server --requirepass ${VALKEY_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Langfuse — LLM observability / tracing
  # --------------------------------------------------------------------------
  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aaa}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-aaa}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET_KEY:-changeme}
      SALT: ${LANGFUSE_SECRET_KEY:-changeme}
      NEXTAUTH_URL: http://localhost:3003
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    ports:
      - "3003:3000"

  # --------------------------------------------------------------------------
  # OpenBao — Secrets management (Stage C credential vault)
  # --------------------------------------------------------------------------
  openbao:
    image: openbao/openbao:2.0.0
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${BAO_TOKEN:-dev-root-token}
    ports:
      - "8200:8200"
    command: server -dev

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  valkey_data:
