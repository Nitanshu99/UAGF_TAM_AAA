# AAA — Continuous Integration
# Pipeline: lint → security → unit tests → coverage → smoke → dagster-validate
name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint deps
        run: pip install ruff mypy pydantic-settings structlog prometheus-client
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Type-check (mypy)
        run: mypy aaa/ --ignore-missing-imports
        continue-on-error: true

  # ── Job 2: Security Scan ──────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit + pip-audit
        run: pip install bandit pip-audit
      - name: Bandit SAST scan
        run: bandit -r aaa/ -ll --exit-zero
      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt --exit-zero

  # ── Job 3: Unit Tests + Coverage ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aaa
          POSTGRES_PASSWORD: aaa
          POSTGRES_DB: aaa
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.9.4
        ports: ["6333:6333"]
      minio:
        image: minio/minio:RELEASE.2024-11-07T00-52-20Z
        env:
          MINIO_ROOT_USER: aaa
          MINIO_ROOT_PASSWORD: aaa-secret
        ports: ["9000:9000"]
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
    env:
      AAA_OFFLINE_MODE: "true"
      CGSA_FIXTURE_DIR: scripts/fixtures/cgsa
      DATABASE_URL: postgresql://aaa:aaa@localhost:5432/aaa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Run unit tests with coverage
        run: |
          pytest \
            --cov=aaa \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=75 \
            -m "not e2e and not golden" \
            -x -q
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Job 4: Dagster Validate ───────────────────────────────────────────────
  dagster_validate:
    name: Dagster Code Location Validate
    runs-on: ubuntu-latest
    needs: [test]
    env:
      AAA_OFFLINE_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install dagster dagster-webserver pydantic-settings structlog prometheus-client
          pip install -e .
      - name: Validate Dagster code location
        run: dagster definitions validate -m aaa.dagster.definitions

  # ── Job 5: Offline Smoke Run ──────────────────────────────────────────────
  smoke:
    name: Offline Smoke Run
    runs-on: ubuntu-latest
    needs: [test]
    env:
      AAA_OFFLINE_MODE: "true"
      CGSA_FIXTURE_DIR: scripts/fixtures/cgsa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Smoke run (offline)
        run: |
          python -m aaa.cli run \
            --engagement-id ci-smoke-001 \
            --intake-dir scripts/fixtures/uci_german_credit \
            --cgsa-fixture-dir scripts/fixtures/cgsa \
            --offline
      - name: Upload smoke logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs
          path: logs/
          retention-days: 7
